version: "3.9"

# =============================================================================
# Volqan — Development Docker Compose
# =============================================================================
# Services:
#   volqan    — The Volqan application (API + Admin)
#   postgres  — PostgreSQL 16 database
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Volqan application
  # ---------------------------------------------------------------------------
  volqan:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder          # Use builder stage for development (includes source maps)
    container_name: volqan-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3000"
      ADMIN_PORT: "3001"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/volqan?schema=public"
      JWT_SECRET: "dev-jwt-secret-change-in-production-immediately"
      # Bazarix marketplace integration (optional in dev)
      # BAZARIX_LICENSE_KEY: ""
    ports:
      - "3000:3000"            # API
      - "3001:3001"            # Admin UI
    volumes:
      # Mount source for hot-reload in development
      - .:/app
      # Persist node_modules inside container (prevents host/container conflicts)
      - /app/node_modules
      - /app/packages/admin/.next
      # Persist uploads
      - volqan-uploads:/app/public/uploads
    command: pnpm dev
    networks:
      - volqan-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: volqan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: volqan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"            # Expose to host for local Prisma Studio / migrations
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - volqan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d volqan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  volqan-uploads:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  volqan-network:
    driver: bridge
